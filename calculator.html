<!DOCTYPE html>
<html>
<head>
	<title>Calculator</title>
	<link rel="stylesheet" type="text/css" href="style.css">
</head>
<body style="background-color: black;">
	<div class="calculator">
		<div class="display">
			<input type="text" name="display" id="display" readonly>
		</div>
		<div class="buttons">
			<button class="light-gray" onclick="clearDisplay()">AC</button>
			<button class="light-gray" onclick="deleteLastChar()">&lt;-</button>
			<button class="light-gray" onclick="addToDisplay('%')">%</button>
			<button class="orange" onclick="addToDisplay('/')">÷</button>
			<button onclick="addToDisplay('1')">1</button>
			<button onclick="addToDisplay('2')">2</button>
			<button onclick="addToDisplay('3')">3</button>
			<button class="orange" onclick="addToDisplay('*')">×</button>
			<button onclick="addToDisplay('4')">4</button>
			<button onclick="addToDisplay('5')">5</button>
			<button onclick="addToDisplay('6')">6</button>
			<button class="orange" onclick="addToDisplay('-')">-</button>
			<button onclick="addToDisplay('7')">7</button>
			<button onclick="addToDisplay('8')">8</button>
			<button onclick="addToDisplay('9')">9</button>
			<button class="orange" onclick="addToDisplay('+')">+</button>
			<button class="wide" onclick="addToDisplay('0')">0</button>
			<button onclick="addToDisplay('.')">.</button>
			<button class="orange" onclick="calculate()">=</button>
		</div>
	</div>

	<script src="script.js"></script>
</body>
</html>
